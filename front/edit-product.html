<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Editar producto | EcoMarket</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"><link href="../assets/css/style.css" rel="stylesheet"></head><body><div data-navbar></div><main><header class="page-header"><div class="container"><h1 id="formTitle" class="section-title">Editar producto</h1><p class="mb-0">Actualiza la información de tu publicación.</p></div></header><section class="container py-5"><form id="productForm" class="card p-4 p-md-5 mx-auto" style="max-width:780px"><div class="row g-3"><div class="col-md-8"><label class="form-label">Nombre</label><input class="form-control" name="nombre" required></div><div class="col-md-4"><label class="form-label">Precio (COP)</label><input class="form-control" name="precio" type="number" min="0" step="1" required></div><div class="col-md-6"><label class="form-label">Categoría</label><input class="form-control" name="categoria" required></div><div class="col-md-6"><label class="form-label">URL de imagen</label><input class="form-control" name="imagen" type="url"></div><div class="col-12"><label class="form-label">Descripción</label><textarea class="form-control" name="descripcion" rows="5" required></textarea></div><div class="col-12 d-flex gap-2 mt-4"><a class="btn btn-light" href="catalog.html">Cancelar</a><button class="btn btn-eco" type="submit"><i class="bi bi-check-lg"></i> <span id="saveText">Guardar cambios</span></button></div></div></form></section></main><div data-footer></div><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script type="module" src="../assets/js/app.js"></script><script type="module" src="../assets/js/crud.js"></script></body></html>
